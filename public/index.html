<!DOCTYPE html>
<html lang="es-CO">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0E1116">
  <title>finanzas-app</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>

  <!-- ===== LOGIN ===== -->
  <main id="view-login" class="login-wrap" hidden>
    <section class="login-card">
      <h1 class="brand">finanzas<span class="brand-accent">·app</span></h1>
      <p class="login-sub">Tu plata, cada peso con trabajo asignado.</p>

      <form id="login-form" novalidate>
        <label class="field">
          <span class="field-label">Correo</span>
          <input id="login-email" type="email" autocomplete="email" inputmode="email" required>
        </label>
        <label class="field">
          <span class="field-label">Contraseña</span>
          <input id="login-password" type="password" autocomplete="current-password" required>
        </label>
        <p id="login-error" class="error" hidden></p>
        <button id="login-submit" class="btn btn-primary" type="submit">Entrar</button>
      </form>
    </section>
  </main>

  <!-- ===== APP ===== -->
  <div id="view-app" hidden>
    <header class="topbar">
      <span class="brand brand-sm">finanzas<span class="brand-accent">·app</span></span>
      <div class="topbar-right">
        <span id="user-email" class="user-email"></span>
        <button id="btn-logout" class="btn btn-ghost" type="button">Salir</button>
      </div>
    </header>

    <main id="app-main" class="app-main">
      <p class="placeholder">Sesión iniciada. El dashboard llega en el siguiente paso.</p>
    </main>
  </div>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
